<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Linktree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="./icons/test.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }

        /* Canvas de estrelas fica fixo atrás de tudo */
        #starCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        /* Fundo azul escuro animado */
        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #020812, #050f20, #07152e, #040c1a, #010408);
            background-size: 400% 400%;
            animation: gradientFlow 20s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientFlow {
            0%   { background-position: 0% 0%; }
            25%  { background-position: 100% 0%; }
            50%  { background-position: 100% 100%; }
            75%  { background-position: 0% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* Nebulosa */
        .nebula {
            position: absolute;
            width: 150%; height: 150%;
            background:
                radial-gradient(ellipse at 20% 40%, rgba(10,50,160,0.28) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 65%, rgba(5,25,100,0.22) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 85%, rgba(15,70,200,0.16) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 20%, rgba(8,40,130,0.2) 0%, transparent 45%);
            filter: blur(55px);
            animation: nebulaMove 35s ease infinite;
        }

        @keyframes nebulaMove {
            0%, 100% { transform: translate(-10%,-10%) rotate(0deg); }
            33%       { transform: translate(5%,5%) rotate(4deg); }
            66%       { transform: translate(-5%,10%) rotate(-4deg); }
        }

        /* Glass */
        .glass-effect {
            background: rgba(4,12,30,0.5);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(50,100,220,0.25);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6),
                        0 0 0 1px rgba(40,90,200,0.12) inset,
                        0 0 20px rgba(20,60,160,0.08);
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
        }

        .glass-effect:hover {
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-color: rgba(60,130,255,0.5);
            box-shadow: 0 20px 60px rgba(15,50,180,0.3),
                        0 0 40px rgba(25,70,210,0.2),
                        0 0 0 1px rgba(50,110,240,0.3) inset;
            transform: translateY(-10px);
        }

        /* LED Quântico */
        .quantum-led {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(40,90,200,0.15);
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            background: rgba(4,12,30,0.3);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            box-shadow: 0 10px 40px rgba(0,0,0,0.7),
                        0 0 0 1px rgba(30,70,180,0.08) inset;
        }

        .quantum-led:hover {
            border-color: rgba(50,110,255,0.35);
            background: rgba(5,18,42,0.4);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8),
                        0 0 30px rgba(25,75,210,0.2),
                        0 0 0 1px rgba(50,110,240,0.25) inset;
        }

        /* Foto de perfil */
        .cosmic-profile {
            position: relative;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(45deg, #1a4fc4, #0e2d7a, #2060d8);
            animation: profilePulse 4s ease-in-out infinite;
            box-shadow: 0 0 14px rgba(40,100,220,0.35), 0 0 28px rgba(30,80,190,0.15);
            transition: all 0.5s;
        }

        @keyframes profilePulse {
            0%,100% { box-shadow: 0 0 14px rgba(40,100,220,0.35), 0 0 28px rgba(30,80,190,0.15); transform: scale(1); }
            50%      { box-shadow: 0 0 22px rgba(50,120,240,0.5),  0 0 42px rgba(30,80,200,0.25); transform: scale(1.03); }
        }

        .cosmic-profile:hover {
            transform: scale(1.07) rotate(3deg);
            box-shadow: 0 0 28px rgba(50,120,255,0.55), 0 0 55px rgba(30,80,200,0.3);
        }

        .cosmic-profile img {
            border-radius: 50%;
            border: 2px solid rgba(40,100,220,0.3);
            transition: all 0.5s;
            filter: brightness(1.05);
        }

        .cosmic-profile:hover img {
            filter: brightness(1.15) contrast(1.05);
            border-color: rgb(24,147,255);
        }

        /* Banner */
        .dimensional-banner {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(21,161,255,0.8);
            perspective: 1000px;
            transition: all 0.5s;
            border: 2px solid rgba(57,107,244,0.7);
        }

        .dimensional-banner::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #1a4fc4, #0e2d7a, #2060d8, #1a4fc4);
            background-size: 300% 300%;
            animation: ledBannerRotate 3s linear infinite;
            border-radius: 24px;
            z-index: -1;
            opacity: 0.45;
        }

        @keyframes ledBannerRotate {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .dimensional-banner:hover {
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 60px rgb(47,200,255);
            transform: translateY(-5px);
        }

        .dimensional-banner:hover::before { opacity: 1; }

        .dimensional-banner img { width: 100%; height: 200px; object-fit: cover; }

        .banner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg,
                rgba(30,90,220,0.3) 0%, transparent 50%, rgba(15,50,180,0.2) 100%);
            mix-blend-mode: overlay;
            transition: all 0.5s;
        }

        .dimensional-banner:hover .banner-overlay {
            background: linear-gradient(135deg,
                rgba(40,110,255,0.4) 0%, transparent 50%, rgba(20,60,200,0.3) 100%);
        }

        /* Links */
        .quantum-link { transition: all 0.5s cubic-bezier(0.4,0,0.2,1); }
        .quantum-link:hover { transform: translateY(-10px) scale(1.03); }

        .quantum-link:hover .link-icon {
            transform: scale(1.4) rotate(10deg);
            filter: drop-shadow(0 0 20px rgba(80,150,255,0.8)) brightness(1.3);
        }

        .link-icon {
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            filter: drop-shadow(0 0 5px rgba(50,110,240,0.3));
            margin-right: 8px;
        }

        /* Entrada */
        @keyframes quantumEntrance {
            0%   { opacity:0; transform:translateY(50px) scale(0.9); filter:blur(10px); }
            100% { opacity:1; transform:translateY(0) scale(1);      filter:blur(0); }
        }
        .quantum-entrance { animation: quantumEntrance 0.8s cubic-bezier(0.4,0,0.2,1) forwards; }
    </style>
</head>
<body class="relative min-h-screen overflow-x-hidden">

    <!-- Fundo -->
    <div class="galaxy-bg"><div class="nebula"></div></div>

    <!-- Canvas de estrelas -->
    <canvas id="starCanvas"></canvas>

    <!-- Conteúdo -->
    <div class="container mx-auto px-4 py-8 max-w-2xl relative z-10">

        <!-- Banner -->
        <div class="dimensional-banner mb-8 quantum-entrance" style="animation-delay:0.1s">
            <img id="bannerImage" src="./icons/banner.jpg" alt="Banner">
            <div class="banner-overlay"></div>
            <input type="file" id="bannerInput" accept="image/*" class="hidden" onchange="updateBanner(this)">
        </div>

        <!-- Perfil -->
        <div class="text-center mb-10 quantum-entrance" style="animation-delay:0.2s">
            <div class="cosmic-profile w-36 h-36 mx-auto mb-4">
                <img id="profileImage" class="w-full h-full object-cover" src="./icons/pfp.jpg" alt="Profile">
                <input type="file" id="profileInput" accept="image/*" class="hidden" onchange="updateProfile(this)">
            </div>
            <h1 id="profileName" class="text-4xl font-bold text-white mb-2" contenteditable="true">Gabriel Felipe</h1>
            <p id="profileBio" class="text-gray-300 max-w-md mx-auto text-lg" contenteditable="true">Full-Stack Developer | Digital Influencer | Web 3 Enthusiast</p>
        </div>

        <!-- Links -->
        <div id="linksContainer" class="space-y-4 mb-8"></div>

        <!-- Rodapé -->
        <div class="text-center glass-effect py-4 rounded-xl quantum-entrance" style="animation-delay:0.5s">
            <p class="text-gray-400">
                <i class="fas fa-infinity text-blue-400 mr-2"></i>
                LinkTree | CAFÉ
            </p>
        </div>
    </div>

    <script>
    /* =========================================================
       STARFIELD — canvas com estrelas piscando + estrelas cadentes
    ========================================================= */
    (function () {
        const canvas = document.getElementById('starCanvas');
        const ctx    = canvas.getContext('2d');
        let stars = [], shooters = [], W, H, t = 0;

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function mkStars(n) {
            stars = Array.from({ length: n }, () => {
                const s = Math.random();
                return {
                    x:     Math.random() * W,
                    y:     Math.random() * H,
                    r:     0.3 + s * 1.5,
                    base:  0.2  + s * 0.6,
                    spd:   0.003 + s * 0.01,
                    ph:    Math.random() * Math.PI * 2,
                    blue:  Math.random() > 0.65   // tom levemente azulado
                };
            });
        }

        function spawnShooter() {
            shooters.push({
                x:     Math.random() * W * 0.85,
                y:     Math.random() * H * 0.35,
                len:   90 + Math.random() * 130,
                spd:   7  + Math.random() * 9,
                alpha: 1,
                ang:   Math.PI / 5 + (Math.random() - 0.5) * 0.35
            });
        }

        function scheduleShooter() {
            setTimeout(() => { spawnShooter(); scheduleShooter(); },
                       2000 + Math.random() * 5000);
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            t += 0.016;

            /* estrelas fixas */
            for (const s of stars) {
                const a = s.base + Math.sin(t * s.spd * 60 + s.ph) * (s.base * 0.55);
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = s.blue
                    ? `rgba(180,215,255,${a})`
                    : `rgba(255,255,255,${a})`;
                ctx.fill();
            }

            /* estrelas cadentes */
            shooters = shooters.filter(s => s.alpha > 0);
            for (const s of shooters) {
                const dx = Math.cos(s.ang) * s.len;
                const dy = Math.sin(s.ang) * s.len;
                const g  = ctx.createLinearGradient(s.x, s.y, s.x - dx, s.y - dy);
                g.addColorStop(0, `rgba(200,230,255,${s.alpha})`);
                g.addColorStop(1, `rgba(200,230,255,0)`);
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x - dx, s.y - dy);
                ctx.strokeStyle = g;
                ctx.lineWidth   = 1.5;
                ctx.stroke();
                s.x     += Math.cos(s.ang) * s.spd;
                s.y     += Math.sin(s.ang) * s.spd;
                s.alpha -= 0.02;
            }

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', () => { resize(); mkStars(300); });
        resize();
        mkStars(300);
        scheduleShooter();
        draw();
    })();

    /* =========================================================
       LINKS
    ========================================================= */
    const quantumLinks = [
        { title:'Portfólio', url:'https://main-portfolio-sigma-flame.vercel.app/',       icon:'./icons/favicon.jpg',   color1:'#1a4fc4', color2:'#0e2d7a' },
        { title:'Twitter',   url:'https://x.com/ct_cafe87877',  icon:'./icons/twitter.jpg',   color1:'#1e5cd4', color2:'#0d2c8a' },
        { title:'LinkedIn',  url:'https://www.linkedin.com/in/gabriel-felipe-sabino-de-souza-ab05a630a/',        icon:'./icons/linkedin.jpg',  color1:'#1550c0', color2:'#0a2870' },
        { title:'GitHub',    url:'https://github.com/CAFE2l',          icon:'./icons/github.jpg',    color1:'#1a4fc4', color2:'#0e2d7a' },
        { title:'Youtube',   url:'https://www.youtube.com/@CAFE_ct',         icon:'./icons/youtube.png',   color1:'#1e5cd4', color2:'#0d2c8a' },
        { title:'Pinterest', url:'https://br.pinterest.com/abbass11king11duolingo/',       icon:'./icons/pinterest.png', color1:'#1550c0', color2:'#0a2870' },
        { title:'Telegram',  url:'https://t.me/cafect2l',        icon:'./icons/telegram.jpg',  color1:'#1a4fc4', color2:'#0e2d7a' },
        { title:'Discord',  url:'https://discord.com/invite/gW2tShPFxf',        icon:'./icons/discord.jpg',  color1:'#1a4fc4', color2:'#0e2d7a' }
    ];

    function renderLinks() {
        const c = document.getElementById('linksContainer');
        c.innerHTML = '';
        quantumLinks.forEach((link, i) => {
            const el = makeLink(link);
            el.style.animation = `quantumEntrance 0.5s forwards ${i * 0.1}s`;
            el.style.opacity   = '0';
            c.appendChild(el);
        });
    }

    function makeLink(link) {
        const div  = document.createElement('div');
        div.className = 'relative group';
        const grad = `linear-gradient(135deg,${link.color1},${link.color2})`;
        const isImg = /\.(png|jpe?g|gif|svg)$/i.test(link.icon) || link.icon.startsWith('http');
        div.innerHTML = `
            <div class="glass-effect quantum-led rounded-xl p-[2px] quantum-link">
                <a href="${link.url}" target="_blank" class="block relative overflow-hidden rounded-lg">
                    <div class="absolute inset-0 opacity-25 mix-blend-overlay" style="background:${grad}"></div>
                    <div class="relative px-6 py-5 flex items-center gap-4 text-white">
                        ${isImg
                            ? `<img src="${link.icon}" class="w-10 h-10 object-contain link-icon" alt="icon">`
                            : `<i class="${link.icon} text-3xl link-icon" style="color:${link.color1}"></i>`}
                        <span class="font-medium text-lg">${link.title}</span>
                    </div>
                </a>
            </div>`;
        return div;
    }

    function updateBanner(input) {
        if (input.files?.[0]) {
            const r = new FileReader();
            r.onload = e => document.getElementById('bannerImage').src = e.target.result;
            r.readAsDataURL(input.files[0]);
        }
    }
    
    function updateProfile(input) {
        if (input.files?.[0]) {
            const r = new FileReader();
            r.onload = e => document.getElementById('profileImage').src = e.target.result;
            r.readAsDataURL(input.files[0]);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderLinks();
        document.querySelectorAll('.quantum-entrance').forEach((el, i) => {
            el.style.animationDelay = (i * 0.1) + 's';
        });
    });
    </script>
</body>
</html>
